services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_IMAGE_TAG:-v0.10.1}
    restart: unless-stopped
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?Copy .env.example to .env and set WEBUI_SECRET_KEY}
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "${OPEN_WEBUI_BIND_ADDRESS:-127.0.0.1}:${OPEN_WEBUI_PORT:-3000}:8080"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://127.0.0.1:8080/health
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 5
    networks:
      - ai-platform

networks:
  ai-platform:
    name: ${AI_PLATFORM_NETWORK:-ai-platform}
    external: true

volumes:
  open-webui-data:
