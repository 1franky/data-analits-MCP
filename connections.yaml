connections:
  - id: postgres-demo
    name: PostgreSQL Demo
    type: postgres
    host: postgres-lab
    port: 5432
    database: demo
    username: mcp_readonly
    password_env: POSTGRES_DEMO_PASSWORD
    readonly: true
    enabled: true
    connect_timeout_seconds: 10
    query_timeout_seconds: 30
    max_rows: 500
    options:
      application_name: data-platform-mcp
      sslmode: disable

  - id: mariadb-demo
    name: MariaDB Demo
    type: mariadb
    host: mariadb-lab
    port: 3306
    database: demo
    username: mcp_readonly
    password_env: MARIADB_DEMO_PASSWORD
    readonly: true
    enabled: true
    connect_timeout_seconds: 10
    query_timeout_seconds: 30
    max_rows: 500
    options:
      charset: utf8mb4

  - id: mongodb-demo
    name: MongoDB Demo
    type: mongodb
    host: mongo-lab
    port: 27017
    database: demo
    username: mcp_readonly
    password_env: MONGO_DEMO_PASSWORD
    readonly: true
    enabled: true
    connect_timeout_seconds: 10
    query_timeout_seconds: 30
    max_rows: 500
    options:
      authSource: demo

  # YugabyteDB YSQL es compatible con el protocolo de PostgreSQL, por eso usa type: postgres.
  # El host "yugabyte-lab" es el container_name del servicio definido en ../yugabyte/compose.yaml,
  # que debe estar unido a esta misma red externa "ai-platform" para ser alcanzable.
  - id: yugabyte-hub-domi
    name: YugabyteDB Hub Domiciliacion
    type: postgres
    host: yugabyte-lab
    port: 5433
    database: hub_domiciliacion
    username: mcp_readonly
    password_env: YUGABYTE_DEMO_PASSWORD
    readonly: true
    enabled: true
    connect_timeout_seconds: 10
    query_timeout_seconds: 30
    max_rows: 500
    options:
      application_name: data-platform-mcp
      sslmode: disable

catalog:
  enabled: true
  refresh_interval_minutes: 60
  refresh_on_startup: true
  stale_after_minutes: 120
  excluded_schemas:
    - information_schema
    - pg_catalog
  include_table_patterns:
    - "*"
  exclude_table_patterns: []

query:
  global_max_rows: 1000
  max_serialized_bytes: 1000000
  max_concurrent_queries: 4

audit:
  enabled: true

generation:
  enabled: false
  max_context_tables: 20
  max_definition_chars: 8000
  # provider:
  #   type: openai_compatible
  #   base_url: http://llm-gateway:8080/v1
  #   api_key_env: LLM_API_KEY
  #   model: gpt-4o-mini
  #   timeout_seconds: 30
  #   max_output_tokens: 1024
  #   temperature: 0.0
  #   json_mode: true

reporting:
  enabled: false
  default_row_limit: 1000
  max_inline_bytes: 5000000
  on_size_exceeded: truncate
  allowed_formats: [csv, json, xlsx, pdf]

rag:
  enabled: false
  documents_path: /app/documents
  allowed_extensions: [".md", ".txt", ".sql", ".json", ".yaml", ".yml"]
  chunk_size: 1000
  chunk_overlap: 150
  max_document_bytes: 5000000
  refresh_interval_minutes: 60
  refresh_on_startup: true
  max_search_results: 20
  # embedding_provider:
  #   type: openai_compatible
  #   base_url: http://llm-gateway:8080/v1
  #   api_key_env: EMBEDDING_API_KEY
  #   model: text-embedding-3-small
  #   dimensions: 1536
  #   timeout_seconds: 30
  #   batch_size: 64
  vector_store:
    url: http://qdrant:6333
    collection_name: documents
    timeout_seconds: 10
