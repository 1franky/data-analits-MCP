connections:
  - id: postgres-demo
    name: PostgreSQL Demo
    type: postgres
    host: postgres-lab
    port: 5432
    database: demo
    username: mcp_readonly
    password_env: POSTGRES_DEMO_PASSWORD
    readonly: true
    enabled: true
    connect_timeout_seconds: 10
    query_timeout_seconds: 30
    max_rows: 500
    options:
      application_name: data-platform-mcp
      sslmode: disable

catalog:
  enabled: true
  refresh_interval_minutes: 60
  refresh_on_startup: true
  stale_after_minutes: 120
  excluded_schemas:
    - information_schema
    - pg_catalog
  include_table_patterns:
    - "*"
  exclude_table_patterns: []

query:
  global_max_rows: 1000
  max_serialized_bytes: 1000000
  max_concurrent_queries: 4

audit:
  enabled: true

generation:
  enabled: false
  max_context_tables: 20
  # provider:
  #   type: openai_compatible
  #   base_url: http://llm-gateway:8080/v1
  #   api_key_env: LLM_API_KEY
  #   model: gpt-4o-mini
  #   timeout_seconds: 30
  #   max_output_tokens: 1024
  #   temperature: 0.0
  #   json_mode: true

reporting:
  enabled: false
  default_row_limit: 1000
  max_inline_bytes: 5000000
  on_size_exceeded: truncate
  allowed_formats: [csv, json, xlsx, pdf]
