services:
  data-platform-mcp:
    image: data-platform-mcp:${IMAGE_TAG:-0.9.0}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    init: true
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --log-level
      - ${LOG_LEVEL:-info}
    environment:
      CONNECTIONS_FILE: /app/connections.yaml
      CATALOG_DB_PATH: ${CATALOG_DB_PATH:-/app/data/catalog.db}
      AUDIT_DB_PATH: ${AUDIT_DB_PATH:-/app/data/audit.db}
      DOCUMENTS_DB_PATH: ${DOCUMENTS_DB_PATH:-/app/data/documents.db}
      POSTGRES_DEMO_PASSWORD: ${POSTGRES_DEMO_PASSWORD:?Copy .env.example to .env and set POSTGRES_DEMO_PASSWORD}
      MARIADB_DEMO_PASSWORD: ${MARIADB_DEMO_PASSWORD:-}
      MONGO_DEMO_PASSWORD: ${MONGO_DEMO_PASSWORD:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
    volumes:
      - ./connections.yaml:/app/connections.yaml:ro
      - ./documents:/app/documents:ro
      - catalog-data:/app/data
    ports:
      - "${MCP_BIND_ADDRESS:-127.0.0.1}:${MCP_PORT:-8000}:8000"
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          r = urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2);
          raise SystemExit(0 if r.status == 200 else 1)
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      postgres-lab:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      mariadb-lab:
        condition: service_healthy
      mongo-lab:
        condition: service_healthy
    networks:
      - ai-platform

  postgres-lab:
    image: data-platform-postgres-lab:${POSTGRES_IMAGE_TAG:-17.10}
    build:
      context: .
      dockerfile: Dockerfile
      target: postgres-lab
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_LAB_ADMIN_PASSWORD:?Copy .env.example to .env and set POSTGRES_LAB_ADMIN_PASSWORD}
      POSTGRES_DB: demo
      POSTGRES_DEMO_PASSWORD: ${POSTGRES_DEMO_PASSWORD:?Copy .env.example to .env and set POSTGRES_DEMO_PASSWORD}
    ports:
      - "${POSTGRES_LAB_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_LAB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d demo
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 10
    networks:
      - ai-platform

  qdrant:
    image: qdrant/qdrant:${QDRANT_IMAGE_TAG:-v1.17.1}
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - "exec 3<>/dev/tcp/127.0.0.1/6333"
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - ai-platform

  mariadb-lab:
    image: data-platform-mariadb-lab:${MARIADB_IMAGE_TAG:-11.4}
    build:
      context: .
      dockerfile: Dockerfile
      target: mariadb-lab
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_LAB_ADMIN_PASSWORD:?Copy .env.example to .env and set MARIADB_LAB_ADMIN_PASSWORD}
      MARIADB_DATABASE: demo
      MARIADB_DEMO_PASSWORD: ${MARIADB_DEMO_PASSWORD:?Copy .env.example to .env and set MARIADB_DEMO_PASSWORD}
    ports:
      - "${MARIADB_LAB_BIND_ADDRESS:-127.0.0.1}:${MARIADB_LAB_PORT:-3306}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb-admin ping -h 127.0.0.1 -u root -p"$$MARIADB_ROOT_PASSWORD" --silent
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 10
    networks:
      - ai-platform

  mongo-lab:
    image: data-platform-mongo-lab:${MONGO_IMAGE_TAG:-8.0}
    build:
      context: .
      dockerfile: Dockerfile
      target: mongo-lab
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_LAB_ADMIN_PASSWORD:?Copy .env.example to .env and set MONGO_LAB_ADMIN_PASSWORD}
      MONGO_INITDB_DATABASE: demo
      MONGO_DEMO_PASSWORD: ${MONGO_DEMO_PASSWORD:?Copy .env.example to .env and set MONGO_DEMO_PASSWORD}
    ports:
      - "${MONGO_LAB_BIND_ADDRESS:-127.0.0.1}:${MONGO_LAB_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mongosh --quiet -u root -p "$$MONGO_INITDB_ROOT_PASSWORD"
          --authenticationDatabase admin --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    networks:
      - ai-platform

networks:
  ai-platform:
    name: ${AI_PLATFORM_NETWORK:-ai-platform}
    external: true

volumes:
  catalog-data:
  postgres-data:
  qdrant-data:
  mariadb-data:
  mongo-data:
