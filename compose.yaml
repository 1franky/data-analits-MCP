services:
  data-platform-mcp:
    image: data-platform-mcp:${IMAGE_TAG:-0.1.0}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    init: true
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --log-level
      - ${LOG_LEVEL:-info}
    ports:
      - "${MCP_BIND_ADDRESS:-127.0.0.1}:${MCP_PORT:-8000}:8000"
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          r = urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2);
          raise SystemExit(0 if r.status == 200 else 1)
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - ai-platform

networks:
  ai-platform:
    name: ${AI_PLATFORM_NETWORK:-ai-platform}
    external: true
