services:
  data-platform-mcp:
    image: data-platform-mcp:${IMAGE_TAG:-0.7.0}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    init: true
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --log-level
      - ${LOG_LEVEL:-info}
    environment:
      CONNECTIONS_FILE: /app/connections.yaml
      CATALOG_DB_PATH: ${CATALOG_DB_PATH:-/app/data/catalog.db}
      AUDIT_DB_PATH: ${AUDIT_DB_PATH:-/app/data/audit.db}
      POSTGRES_DEMO_PASSWORD: ${POSTGRES_DEMO_PASSWORD:?Copy .env.example to .env and set POSTGRES_DEMO_PASSWORD}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ./connections.yaml:/app/connections.yaml:ro
      - catalog-data:/app/data
    ports:
      - "${MCP_BIND_ADDRESS:-127.0.0.1}:${MCP_PORT:-8000}:8000"
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          r = urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2);
          raise SystemExit(0 if r.status == 200 else 1)
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      postgres-lab:
        condition: service_healthy
    networks:
      - ai-platform

  postgres-lab:
    image: data-platform-postgres-lab:${POSTGRES_IMAGE_TAG:-17.10}
    build:
      context: .
      dockerfile: Dockerfile
      target: postgres-lab
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_LAB_ADMIN_PASSWORD:?Copy .env.example to .env and set POSTGRES_LAB_ADMIN_PASSWORD}
      POSTGRES_DB: demo
      POSTGRES_DEMO_PASSWORD: ${POSTGRES_DEMO_PASSWORD:?Copy .env.example to .env and set POSTGRES_DEMO_PASSWORD}
    ports:
      - "${POSTGRES_LAB_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_LAB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d demo
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 10
    networks:
      - ai-platform

networks:
  ai-platform:
    name: ${AI_PLATFORM_NETWORK:-ai-platform}
    external: true

volumes:
  catalog-data:
  postgres-data:
